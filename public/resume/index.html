    <style>
      :root {
        --bg: #0a0b12;
        --bg-elev: #11131d;
        --bg-elev-2: #181b28;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --text: #e7e9f2;
        --text-muted: #8b90a8;
        --text-dim: #7a8099;
        --accent: #5eead4;
        --gradient: linear-gradient(135deg, #5eead4 0%, #8b5cf6 50%, #f472b6 100%);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
      a:hover { color: #fff; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(10, 11, 18, 0.8);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
      }

      .bar {
        max-width: 1440px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: "Space Grotesk", "Inter", sans-serif;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
      .brand-text strong { color: var(--text); }
      .brand-text span { font-size: 12px; color: var(--text-muted); font-weight: 500; }

      .actions { display: inline-flex; align-items: center; gap: 10px; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: 1px solid transparent;
        transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        text-decoration: none;
      }

      .btn-ghost {
        background: transparent;
        border-color: var(--border-strong);
        color: var(--text);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-primary {
        background: var(--gradient);
        color: #0a0b12;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        opacity: 0.95;
        color: #0a0b12;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      .bg-accent {
        position: absolute;
        inset: -20%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.25;
        filter: blur(80px);
        background:
          radial-gradient(40% 40% at 10% 10%, rgba(94, 234, 212, 0.35), transparent 70%),
          radial-gradient(40% 40% at 90% 20%, rgba(139, 92, 246, 0.35), transparent 70%);
      }

      .viewer {
        position: relative;
        z-index: 1;
        flex: 1;
        margin: 20px auto;
        width: min(1100px, calc(100% - 40px));
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        overflow: hidden;
        box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
      }

      .viewer iframe, .viewer object {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .fallback {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 40px 24px;
        text-align: center;
        color: var(--text-muted);
        gap: 12px;
      }

      .fallback h2 {
        margin: 0;
        font-family: "Space Grotesk", "Inter", sans-serif;
        color: var(--text);
        font-size: 22px;
      }

      footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text-dim);
        font-size: 12px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        text-align: center;
      }

      footer a { color: var(--text-muted); }
      footer a:hover { color: var(--accent); }

      /* Mobile: don't try to embed a PDF, show a download-only card */
      @media (max-width: 768px) {
        body { overflow: auto; }
        main { overflow: visible; }

        .viewer {
          display: none;
        }

        .mobile-card {
          display: flex;
          flex-direction: column;
          gap: 16px;
          align-items: center;
          text-align: center;
          margin: 32px auto;
          padding: 32px 24px;
          width: min(480px, calc(100% - 32px));
          border-radius: 16px;
          border: 1px solid var(--border);
          background: var(--bg-elev);
          position: relative;
          z-index: 1;
        }

        .mobile-card h1 {
          margin: 0;
          font-family: "Space Grotesk", "Inter", sans-serif;
          font-size: 28px;
          letter-spacing: -0.02em;
        }

        .mobile-card p { margin: 0; color: var(--text-muted); line-height: 1.6; }

        .brand-text span { display: none; }
      }

      @media (min-width: 769px) {
        .mobile-card { display: none; }
      }

      /* Print */
      @media print {
        header, footer, .bg-accent { display: none; }
        .viewer { margin: 0; border: 0; border-radius: 0; box-shadow: none; height: 100vh; }
        body { overflow: visible; }
      }
    </style>
  </head>
  <body>
    <header>

        <div class="actions">

          <a class="btn btn-primary" href="/resume.pdf" download="Rishabh-Panesar-Resume.pdf">
            Download PDF
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="bg-accent" aria-hidden="true"></div>

      <div class="viewer" id="pdf-viewer">
        <object data="/resume.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH" type="application/pdf" aria-label="Rishabh Panesar's resume">
          <iframe src="/resume.pdf" title="Rishabh Panesar's resume"></iframe>
          <div class="fallback">
            <h2>Your browser can't preview this PDF.</h2>
            <p>No worries. Grab the file below.</p>
            <a class="btn btn-primary" href="/resume.pdf" download="Rishabh-Panesar-Resume.pdf">
              Download PDF
            </a>
          </div>
        </object>
      </div>

      <div class="mobile-card" role="note">
        <h1>Resume</h1>
        <p>
          PDF previews don't always render well on mobile, so here's the direct download.
          Prefer the web? Try the portfolio.
        </p>
        <a class="btn btn-primary" href="/resume.pdf" download="Rishabh-Panesar-Resume.pdf">
          Download PDF
        </a>
        <a class="btn btn-ghost" href="/">← Back to portfolio</a>
      </div>
    </main>

    <footer>
      © <span id="year"></span> Rishabh Panesar ·

      <a href="mailto:rishabhpanesar@gmail.com">Email</a>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
